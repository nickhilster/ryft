related_conventions:
  naming_patterns_in_domain: Provider helpers are named boost{Provider}; pipeline entry point is ryFine(); App-side orchestration uses verb-based handlers like boost, boostBoth, boostCompareModels, and adjustRefinement.
  structure_of_domain: App owns request shaping and UI state; lib/ryFine.ts owns prompt assembly plus provider dispatch; supporting lib files provide types and persistence; browser tests exercise the UI through a mock provider.
  error_handling_in_domain: executeBoostRequest() translates thrown errors into BoostResult state; ryFine() itself mostly propagates provider exceptions; provider probes and Gemini parsing convert HTTP failures into detailed Error messages.
  testing_in_domain: Current direct tests cover adjacent helpers only; full pipeline behavior is exercised indirectly through browserReport.ts with a mocked Ollama-compatible server.
  documentation_in_domain: docs/pipeline-upgrade-plan.md defines Phases 1-4 and explicitly targets buildSystemPrompt(), wrapUserMessage(), RyFineRequest, and ryFine() for replacement.

related_dependencies:
  internal:
    - component: web/src/lib/agents.ts
      relationship_to_domain: supplies the current agent union that the new skill registry is intended to mirror
      direction: outbound
    - component: web/src/lib/projects.ts
      relationship_to_domain: supplies FewShotExample and example truncation logic
      direction: outbound
    - component: web/src/lib/projectStorage.ts
      relationship_to_domain: supplies recent history for few-shot injection before ryFine() calls
      direction: outbound
    - component: web/src/lib/webllmProvider.ts
      relationship_to_domain: one provider target already using separate system/user prompt inputs
      direction: outbound
    - component: web/src/App.tsx
      relationship_to_domain: caller that shapes requests and consumes streamed chunks/results
      direction: inbound
  external:
    - name: @anthropic-ai/sdk
      purpose_for_domain: hosted provider client
    - name: openai
      purpose_for_domain: generic OpenAI-compatible provider client
    - name: @mlc-ai/web-llm
      purpose_for_domain: browser-local provider engine

testing_patterns:
  framework: node:test for helper units plus a checked-in Playwright-style browser harness
  coverage_areas:
    - repo context formatting helpers
    - saved prompt serialization and import helpers
    - browser UI flows for compare mode, provider errors, and slow streaming responses via a mock Ollama-compatible endpoint
  test_organization: unit helpers live under web/tests/*.test.ts; end-to-end browser harness logic is consolidated in web/tests/browserReport.ts
  mock_patterns:
    - local mock Ollama-compatible SSE server in browserReport.ts
    - in-memory storage stub in savedPrompts.test.ts

open_questions:
  - question: Where should Phase 4 source userSkills from before the Phase 5 UI exists?
    context: The Phase 4 plan adds request.userSkills and re-exports UserSkill from ryFine.ts, but current App request construction has no userSkills state or storage.
  - question: Should detectOutputType() remain in ryFine.ts unchanged after the pipeline rewrite, or be considered part of the broader pipeline surface?
    context: The plan for Phases 1-4 does not mention detectOutputType(), but it is part of the current post-provider control flow returned to App.

gaps:
  - area: direct unit coverage for prompt assembly
    description: No existing tests exercise buildSystemPrompt(), wrapUserMessage(), or ryFine() in isolation.
    impact: Prompt-assembly regressions from Phases 1-4 would currently be caught only by manual checks or the broader browser harness.
  - area: exact future UI trace wiring
    description: The report scope stops at Phases 1-4; the detailed App state for PipelineTrace rendering appears later in the plan at Phase 6 and is not implemented in the current code.
    impact: This does not block the core pipeline research, but it means onTrace consumer points are only defined in planning docs, not in current code.
