patterns_found:
  - category: control_flow
    pattern: App-side boost actions all converge on a single executor before calling ryFine().
    description: Single boost, compare-without/with-repo, compare-models, prompt-library boost, and adjustment iterations all normalize through executeBoostRequest().
    examples:
      - file: web/src/App.tsx
        location: web/src/App.tsx:1104
        snippet: executeBoostRequest(...) resolves the key, loads recent project history, calls ryFine(), streams chunks into state, and archives successful runs.
      - file: web/src/App.tsx
        location: web/src/App.tsx:1200
        snippet: boost() calls executeBoostRequest with current provider/model/agent/customInstructions/repoContext.
      - file: web/src/App.tsx
        location: web/src/App.tsx:1414
        snippet: adjustRefinement() reuses executeBoostRequest with prior output as promptText and merged custom instructions.
    prevalence: common
  - category: architecture
    pattern: Prompt assembly is centralized in ryFine.ts and still based on hardcoded strings.
    description: A single AGENT_SYSTEM_PROMPTS record plus buildSystemPrompt()/wrapUserMessage() determines all prompt assembly behavior before provider dispatch.
    examples:
      - file: web/src/lib/ryFine.ts
        location: web/src/lib/ryFine.ts:55
        snippet: const AGENT_SYSTEM_PROMPTS: Record<Agent, string> = { ... }
      - file: web/src/lib/ryFine.ts
        location: web/src/lib/ryFine.ts:126
        snippet: buildSystemPrompt(agent, customInstructions, fewShotExamples)
      - file: web/src/lib/ryFine.ts
        location: web/src/lib/ryFine.ts:152
        snippet: wrapUserMessage(promptText, repoContext)
    prevalence: common
  - category: provider_dispatch
    pattern: Provider helpers take systemPrompt plus raw prompt/repo context, then recreate the user message locally.
    description: Anthropic, OpenAI-compatible, and Gemini helpers each call wrapUserMessage() internally; browser AI is the exception because it already takes a final userPrompt string.
    examples:
      - file: web/src/lib/ryFine.ts
        location: web/src/lib/ryFine.ts:185
        snippet: const textContent = wrapUserMessage(promptText, repoContext)
      - file: web/src/lib/ryFine.ts
        location: web/src/lib/ryFine.ts:232
        snippet: const textContent = wrapUserMessage(promptText, repoContext)
      - file: web/src/lib/ryFine.ts
        location: web/src/lib/ryFine.ts:287
        snippet: parts.push({ text: wrapUserMessage(promptText, repoContext) })
      - file: web/src/lib/webllmProvider.ts
        location: web/src/lib/webllmProvider.ts:154
        snippet: boostWithBrowserAi(model, systemPrompt, userPrompt, onChunk, signal)
    prevalence: common
  - category: data_flow
    pattern: Few-shot examples are assembled in App, not inside ryFine().
    description: executeBoostRequest() pulls recent records from IndexedDB, converts them via buildFewShotExamples(), and injects them into the RyFineRequest.
    examples:
      - file: web/src/App.tsx
        location: web/src/App.tsx:1124
        snippet: const recent = await getRecentRecords(activeProjectRef.id, 3)
      - file: web/src/App.tsx
        location: web/src/App.tsx:1126
        snippet: fewShotExamples = buildFewShotExamples(recent)
      - file: web/src/lib/projects.ts
        location: web/src/lib/projects.ts:55
        snippet: buildFewShotExamples(records).slice(0, 3)
    prevalence: occasional

related_architecture:
  components_relevant_to_domain:
    - component: App request orchestration
      responsibility: Collect active UI state and translate it into BoostRunRequest / RyFineRequest calls.
      location: web/src/App.tsx
      relationship_to_domain: domain feeds ryFine() from here
    - component: Core refinement orchestrator
      responsibility: Assemble prompts and choose the provider helper to execute.
      location: web/src/lib/ryFine.ts
      relationship_to_domain: primary implementation of the domain
    - component: Browser AI provider
      responsibility: Execute local browser-based streaming completions using separate system and user messages.
      location: web/src/lib/webllmProvider.ts
      relationship_to_domain: provider target used by ryFine() switch dispatch
    - component: Project history storage
      responsibility: Supply recent prompt history for few-shot examples.
      location: web/src/lib/projectStorage.ts and web/src/lib/projects.ts
      relationship_to_domain: outbound dependency used before prompt assembly
  interfaces_used_by_domain:
    - interface: RyFineRequest
      location: web/src/lib/ryFine.ts:12
      usage_pattern: Shared request contract passed from App into the refinement pipeline.
    - interface: FewShotExample
      location: web/src/lib/projects.ts:19
      usage_pattern: App computes these from project history and injects them into RyFineRequest.
    - interface: Agent
      location: web/src/lib/agents.ts:1
      usage_pattern: Dropdown-selected agent currently indexes AGENT_SYSTEM_PROMPTS and will map to SkillId in the plan.
  data_flow_involving_domain: App state produces BoostRunRequest values; executeBoostRequest resolves provider credentials and optional few-shot examples; ryFine() builds a single systemPrompt and a wrapped user message; ryFine() applies provider-specific vision filtering; one provider helper performs the streaming call; chunks stream back into App result state; successful results may be archived as PromptRecord entries.
  key_relationships_to_domain:
    - from: web/src/App.tsx
      to: web/src/lib/projectStorage.ts
      relationship: calls getRecentRecords
    - from: web/src/App.tsx
      to: web/src/lib/projects.ts
      relationship: calls buildFewShotExamples
    - from: web/src/App.tsx
      to: web/src/lib/ryFine.ts
      relationship: calls ryFine and detectOutputType
    - from: web/src/lib/ryFine.ts
      to: web/src/lib/webllmProvider.ts
      relationship: calls boostWithBrowserAi

