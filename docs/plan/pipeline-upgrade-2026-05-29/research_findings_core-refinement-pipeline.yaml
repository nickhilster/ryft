    - run_in_terminal
  scope: narrowed to App request assembly, web/src/lib/ryFine.ts prompt assembly and provider dispatch, supporting types in agents/projects/projectStorage/webllmProvider, and tests that exercise the boost flow
  confidence: high
  coverage: 85

