plan_id: pipeline-upgrade-2026-05-29
objective: implement the attached docs/pipeline-upgrade-plan.md end-to-end in the RyFine web app
focus_area: core refinement pipeline in web/src/lib, especially current prompt assembly and provider call flow
created_at: 2026-05-29
created_by: GitHub Copilot
status: completed

tldr: |
  - App-side refinement requests funnel through executeBoostRequest in web/src/App.tsx, which enriches each request with few-shot examples from recent project history before calling ryFine().
  - The current pipeline in web/src/lib/ryFine.ts is still a two-function prompt builder: buildSystemPrompt() composes the system prompt and wrapUserMessage() composes the user payload, then ryFine() dispatches to provider-specific streaming functions.
  - Phase 1 maps directly to replacing AGENT_SYSTEM_PROMPTS with a new skills registry; Phases 2 and 3 add new pure-TS classifier/assembler modules; Phase 4 rewires ryFine(), RyFineRequest, and provider helper signatures around assembled systemPrompt plus userMessage.
  - Existing automated coverage does not test buildSystemPrompt(), wrapUserMessage(), or ryFine() directly; only the browser harness exercises the boost flow indirectly with a mock Ollama-compatible endpoint.

