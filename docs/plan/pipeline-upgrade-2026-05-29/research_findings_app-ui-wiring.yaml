risks_or_constraints:
  - area: App.tsx concentration
    description: phase 5 and 6 both land in App.tsx, which already owns request wiring, drawer routing, palette commands, and output rendering; this increases touch density in one file
    impact: higher merge-conflict and regression surface inside a single root component
  - area: reset consistency
    description: transient-output resets are split across resetTransientOutputState, clear, handleLoadPrompt, handleBoostPrompt, boost/compare setup, and useSelectedCompareResult paths
    impact: new trace state can become stale unless every relevant reset or mode-switch path is updated consistently
  - area: compare-mode separation
    description: trace UI is specified only for single mode, while compare mode uses a separate branch with separate cards and toolbar
    impact: trace rendering or trace-toggle commands must stay gated to single mode to avoid inconsistent UI state
  - area: request-boundary change
    description: phase 5 requires adding userSkills to every request object and phase 6 requires a trace callback and additional trace payload data from ryFine
    impact: app-shell work depends on coordinated request-type and function-signature updates in web/src/lib/ryFine.ts and the future pipeline modules
  - area: drawer exclusivity
    description: openPanel allows only one drawer at a time and the library drawer remains mounted through a left-drawer shell while right drawers are conditionally rendered
    impact: the new skills panel must fit this exclusivity model rather than introduce parallel panel state

