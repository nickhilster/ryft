plan_id: pipeline-upgrade-2026-05-29
objective: implement docs/pipeline-upgrade-plan.md end-to-end in the RyFine web app
focus_area: app-ui-wiring
created_at: 2026-05-29
created_by: GitHub Copilot GPT-5.4
status: completed

tldr: |
  - App UI wiring is centralized in web/src/App.tsx: panel state, palette commands, boost request construction, and output-pane rendering all live there.
  - Drawer mechanics already support Phase 5 with a single mutually exclusive openPanel union, shared drawer markup, shared scrim, and reusable disclosure-trigger styles.
  - Phase 5 must extend the request boundary from App.tsx into ryFine.ts because userSkills are not part of the current RyFineRequest shape and App currently passes only promptText, provider, model, agent, customInstructions, repoContext, image, and derived fewShotExamples.
  - Phase 6 has a clean render slot in the single-result output pane between the existing pane header and output body; compare mode is rendered through a separate branch and is naturally excluded.
  - Main constraints are App.tsx concentration, trace reset consistency across all clear/new-run paths, and preserving current single-vs-compare rendering behavior.

