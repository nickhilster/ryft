related_conventions:
  naming_patterns_in_domain: state setters and handlers use React-style names such as setOpenPanel, handleLoadPrompt, adjustRefinement, and executeBoostRequest; drawer labels and command ids are plain, user-facing strings
  structure_of_domain: App keeps high-level orchestration local, while drawer internals or focused visual units may live in separate components; left and right drawers both use shared shell markup and styles
  error_handling_in_domain: async boost flows convert thrown errors into BoostResult error state; drawer/palette UI mostly relies on disabled states rather than explicit error surfaces
  testing_in_domain: no App-specific UI tests were inspected in this slice; existing visible tests in workspace target saved prompts and repo context libraries rather than the shell
  documentation_in_domain: implementation detail for phases 5-6 is specified directly in docs/pipeline-upgrade-plan.md

