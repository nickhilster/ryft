open_questions:
  - question: should trace state follow the currently displayed single output or only the most recent successful single refinement?
    context: useSelectedCompareResult can copy a compare result back into singleResult at web/src/App.tsx:1093-1100 without any current trace source associated with that adopted result
  - question: should the planned new-skill command directly open the editor state inside SkillManager or only open the drawer?
    context: CommandPalette actions can only call App-level handlers, while the plan notes that SkillManager handles the new form internally
  - question: should prompt-library boosts and adjust refinements both surface pipeline trace exactly the same way as a root boost?
    context: both flows call executeBoostRequest today, but the plan language describes the trace after each successful refinement and could include all single-mode runs

