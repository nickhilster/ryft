tldr: |
  Replace the current hardcoded prompt builder with a client-side four-stage context assembly pipeline, then expose that pipeline through custom skills and a visible trace in the web app.
  Execution is split so the pure TypeScript foundation lands first, core provider wiring stays isolated, App.tsx UI changes are sequenced to avoid merge collisions, and validation plus docs are completed before review.
  Planning used the two available research findings files plus the implementation plan, package scripts, and current README surfaces; the requested validation-docs findings file was not present in docs/plan/pipeline-upgrade-2026-05-29.

open_questions:
  - Should execution proceed with the validation and documentation assumptions captured here, or do you want a replacement research findings file created first for that missing validation-docs slice?

pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: Provider helper signature changes regress streaming behavior or accidentally introduce more than one model call per refinement.
      likelihood: medium
      impact: critical
      mitigation: Keep all pipeline assembly pure and upstream of provider dispatch, preserve provider-specific transport code, and require focused build plus browser-harness validation before docs are updated.
    - scenario: App state for trace visibility or custom skills leaks across clear, compare, and iteration flows, causing stale trace chips or incorrect prompt expansion.
      likelihood: medium
      impact: high
      mitigation: Sequence all App.tsx changes after the core contract is stable, add explicit reset coverage, and validate both single-result and compare-mode paths.
    - scenario: Auto-classification and keyword-triggered user skills apply too broadly, producing lower-quality prompts or surprising users.
      likelihood: medium
      impact: high
      mitigation: Add deterministic unit coverage for scoring thresholds and keyword matching, keep low-confidence fallback behavior explicit, and expose the applied-skill trace for fast debugging.
  assumptions:
    - The requested file docs/plan/pipeline-upgrade-2026-05-29/research_findings_validation-docs.yaml does not exist, so validation and README scope are inferred from docs/pipeline-upgrade-plan.md and the current repo scripts and READMEs.
    - The implementation will stay inside web/ plus README.md and web/README.md, with no required site/ changes.
    - The Browser AI provider contract already accepts separate system and user prompts and can remain behaviorally unchanged apart from the upstream assembly inputs.

implementation_specification:
  code_structure: Keep stages 1-3 as pure TypeScript modules under web/src/lib, keep stage 4 as a thin orchestration change in ryFine.ts, isolate custom-skill persistence in a dedicated localStorage helper, and add UI-only components for the skills drawer and pipeline trace while App.tsx remains the integration boundary.
  affected_areas:
    - web/src/lib/skills.ts
    - web/src/lib/intentClassifier.ts
    - web/src/lib/contextAssembler.ts
    - web/src/lib/ryFine.ts
    - web/src/lib/userSkills.ts
    - web/src/components/SkillManager.tsx
    - web/src/components/PipelineTrace.tsx
    - web/src/App.tsx
    - web/src/App.css
    - web/tests/*.test.ts
    - README.md
    - web/README.md
  component_details:
    - component: skills registry
      responsibility: Define the built-in skill catalog, detection signals, and lookup helpers that replace the current hardcoded agent prompt record.
      interfaces:
        - BUILT_IN_SKILLS
        - getSkill(id)
        - getAllSkills()
    - component: intent classifier
      responsibility: Score raw prompt text against built-in skill signals and return deterministic primary, secondary, signal, and confidence metadata for auto-routing.
      interfaces:
        - classifyIntent(promptText)
        - isConfidentClassification(result)
    - component: context assembler
      responsibility: Combine built-in skills, optional user skills, custom instructions, repo context, and few-shot examples into the assembled system prompt, user message, and UI trace.
      interfaces:
        - assembleContext(input)
        - PipelineTrace
        - UserSkill
        - AssemblyInput
        - AssemblyOutput
    - component: refinement runtime integration
      responsibility: Call the classifier and assembler inside ryFine(), forward the assembled messages to existing providers, and emit trace data before streaming begins.
      interfaces:
        - RyFineRequest.userSkills
        - ryFine(request, onChunk, signal, onTrace)
    - component: custom skills management UI
      responsibility: Let users create, edit, delete, persist, and surface reusable custom skills from a dedicated drawer.
      interfaces:
        - loadUserSkills()
        - saveUserSkills(skills)
        - SkillManager props
    - component: pipeline trace UI
      responsibility: Show applied skills and context chips in single-result mode and expand the assembled system prompt on demand.
      interfaces:
        - PipelineTraceProps
        - App-level trace state and command-palette hooks
  dependencies:
    - component: intent classifier
      relationship: Consumes the built-in skills registry signal definitions.
    - component: context assembler
      relationship: Consumes built-in skills, optional classification results, repo context, custom rules, and few-shot examples to build the prompt payload.
    - component: refinement runtime integration
      relationship: Calls the classifier and assembler, then passes assembled strings to provider helpers and Browser AI runtime.
    - component: custom skills management UI
      relationship: Persists UserSkill records and feeds them into App.tsx request construction.
    - component: pipeline trace UI
      relationship: Renders the PipelineTrace emitted by ryFine() for successful single-result runs only.
  integration_points:
    - executeBoostRequest in App.tsx remains the single request gateway and gains userSkills plus trace capture.
    - ryFine.ts remains the only place where assembled prompts cross into provider-specific transports.
    - The top command bar gains a Skills trigger and palette commands without changing existing drawer mechanics.
    - The output pane header gains the trace strip and assembled-prompt expansion only for single-result completions.
    - README.md and web/README.md are updated after validation to describe shipped user-visible behavior rather than planned behavior.

tasks:
  - id: task-001
    title: Establish the built-in skills registry and intent scoring foundation
    description: |
      Deliver the pure TypeScript foundation for stages 1 and 2 by replacing the current hardcoded agent prompt map with a typed skills registry and deterministic intent classifier.
      Keep this slice focused on new lib modules and compatibility with the existing Agent union so the rest of the pipeline can build on a stable contract.
    agent: gem-implementer
    priority: high
    status: completed
    dependencies: []
    context_files:
      - web/src/lib/agents.ts: Existing Agent union that the new SkillId should mirror.
      - web/src/lib/ryFine.ts: Current hardcoded prompt map being replaced in later phases.
      - docs/pipeline-upgrade-plan.md: Source requirements for phases 1 and 2.
    estimated_effort: medium
    estimated_files: 3
    estimated_lines: 260
    focus_area: pure TypeScript skill selection
    verification:
      - npm --prefix web run build
      - npm --prefix web run lint
    acceptance_criteria:
      - BUILT_IN_SKILLS contains the exact eight built-in skills and compiles cleanly against the Agent union.
      - classifyIntent returns stable primary and confidence outcomes for coding, content, data, and empty-input cases from the plan.
      - The implementation adds no provider calls, storage behavior, or UI changes in this slice.
    failure_modes:
      - scenario: Skill ids drift from the existing Agent union and break downstream typing.
        likelihood: medium
        impact: high
        mitigation: Reuse Agent directly for SkillId and verify with a clean TypeScript build before moving on.
      - scenario: Regex or string signal handling over-matches unrelated prompts.
        likelihood: medium
        impact: medium
        mitigation: Keep scoring deterministic and defer focused cross-domain test coverage to task-007.
    requires_review: true
    tech_stack:
      - TypeScript
      - React/Vite workspace typing
    test_coverage: Covered by build and lint in this slice, with focused classifier tests added in task-007.

  - id: task-002
    title: Assemble structured prompt context and trace metadata
    description: |
      Deliver stage 3 as a pure assembly module that turns agent choice, classifier output, custom rules, repo context, few-shot examples, and user skills into one structured system prompt, one user message, and one PipelineTrace.
      Keep ordering deterministic and expose the trace contract needed later by the UI without changing provider code yet.
    agent: gem-implementer
    priority: high
    status: completed
    dependencies:
      - task-001
    context_files:
      - web/src/lib/projects.ts: Existing FewShotExample shape to preserve.
      - web/src/lib/ryFine.ts: Current buildSystemPrompt and wrapUserMessage behavior being superseded.
      - docs/pipeline-upgrade-plan.md: Source requirements for phase 3.
    estimated_effort: medium
    estimated_files: 2
    estimated_lines: 320
    focus_area: deterministic prompt assembly
    verification:
      - npm --prefix web run build
      - npm --prefix web run lint
    acceptance_criteria:
      - assembleContext produces both assembled strings and a trace with skillsApplied, userSkillsApplied, hasRepoContext, hasCustomRules, hasFewShot, and assembledSystemPrompt.
      - Auto mode uses classifier output when confidence is sufficient and falls back to the auto skill when it is not.
      - User messages preserve the required prompt wrapper shape and always end with the closing prompt tag.
    failure_modes:
      - scenario: Section ordering or fallback behavior changes between runs and makes prompt output nondeterministic.
        likelihood: medium
        impact: high
        mitigation: Centralize all ordering inside contextAssembler.ts and verify deterministic examples in task-007.
      - scenario: User skills are always applied even when keyword-gated behavior was intended.
        likelihood: medium
        impact: medium
        mitigation: Implement explicit matching rules and capture them in unit tests before UI rollout.
    requires_review: true
    tech_stack:
      - TypeScript
    test_coverage: Focused assembly and trace tests are added in task-007.

  - id: task-003
    title: Route every refinement through the new pipeline without changing provider semantics
    description: |
      Replace the legacy buildSystemPrompt and wrapUserMessage flow inside ryFine.ts with classifier plus assembler output, extend the request shape with optional userSkills, and emit trace data before the first streamed chunk.
      Keep the single-call provider behavior intact by only changing the inputs passed to existing provider transports.
    agent: gem-implementer
    priority: high
    status: completed
    dependencies:
      - task-002
    context_files:
      - web/src/lib/ryFine.ts: Core orchestration and provider dispatch contract.
      - web/src/lib/webllmProvider.ts: Browser AI path that already accepts separate system and user prompts.
      - docs/pipeline-upgrade-plan.md: Source requirements for phase 4.
    estimated_effort: medium
    estimated_files: 2
    estimated_lines: 260
    focus_area: core refinement runtime
    verification:
      - npm --prefix web run build
      - npm --prefix web run lint
      - npm --prefix web run test
    acceptance_criteria:
      - ryFine accepts optional userSkills and optional onTrace while preserving current behavior for callers that do not pass onTrace.
      - onTrace fires before streaming begins and carries the assembled system prompt needed by the later UI task.
      - No AGENT_SYSTEM_PROMPTS record or wrapUserMessage call remains in the runtime path.
    failure_modes:
      - scenario: Provider helpers still rebuild user messages internally and diverge from assembled output.
        likelihood: medium
        impact: high
        mitigation: Change provider helper signatures in one slice and verify all call sites compile before any App wiring begins.
      - scenario: Trace emission races with chunk streaming and produces empty or stale prompt expansion.
