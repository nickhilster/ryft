<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080" role="img" aria-labelledby="title desc">
  <title id="title">How RyFine Refines a Prompt</title>
  <desc id="desc">A square infographic showing a rough prompt flowing through RyFine layers such as intent, rules, skills, and context before becoming a refined prompt.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0c" />
      <stop offset="100%" stop-color="#111823" />
    </linearGradient>
    <linearGradient id="rail" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c8f750" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#5cc8ff" stop-opacity="0.18" />
    </linearGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg)" rx="46" />
  <g opacity="0.18">
    <path d="M0 180H1080" stroke="#ffffff" stroke-width="1" />
    <path d="M0 360H1080" stroke="#ffffff" stroke-width="1" />
    <path d="M0 540H1080" stroke="#ffffff" stroke-width="1" />
    <path d="M0 720H1080" stroke="#ffffff" stroke-width="1" />
    <path d="M0 900H1080" stroke="#ffffff" stroke-width="1" />
    <path d="M180 0V1080" stroke="#ffffff" stroke-width="1" />
    <path d="M360 0V1080" stroke="#ffffff" stroke-width="1" />
    <path d="M540 0V1080" stroke="#ffffff" stroke-width="1" />
    <path d="M720 0V1080" stroke="#ffffff" stroke-width="1" />
    <path d="M900 0V1080" stroke="#ffffff" stroke-width="1" />
  </g>

  <text x="82" y="108" fill="#c8f750" font-family="Geist Mono, monospace" font-size="24" letter-spacing="3">RYFINE MEDIA</text>
  <text x="82" y="190" fill="#f4f4f6" font-family="Bricolage Grotesque, sans-serif" font-size="74" font-weight="800">How RyFine</text>
  <text x="82" y="268" fill="#f4f4f6" font-family="Bricolage Grotesque, sans-serif" font-size="74" font-weight="800">Refines a Prompt</text>
  <text x="82" y="326" fill="#b8b8c5" font-family="Hanken Grotesk, sans-serif" font-size="30">Before you ask a model to solve the task, RyFine upgrades the instruction itself.</text>

  <rect x="82" y="404" width="264" height="362" rx="28" fill="#14141a" stroke="#ffffff" stroke-opacity="0.08" />
  <text x="114" y="452" fill="#5cc8ff" font-family="Geist Mono, monospace" font-size="22" letter-spacing="2">RAW PROMPT</text>
  <text x="114" y="518" fill="#f4f4f6" font-family="Hanken Grotesk, sans-serif" font-size="34" font-weight="700">write docs for</text>
  <text x="114" y="560" fill="#f4f4f6" font-family="Hanken Grotesk, sans-serif" font-size="34" font-weight="700">our new repo</text>
  <text x="114" y="626" fill="#8b8b99" font-family="Hanken Grotesk, sans-serif" font-size="28">Missing audience,</text>
  <text x="114" y="664" fill="#8b8b99" font-family="Hanken Grotesk, sans-serif" font-size="28">scope, tone, and</text>
  <text x="114" y="702" fill="#8b8b99" font-family="Hanken Grotesk, sans-serif" font-size="28">deliverable format.</text>

  <rect x="404" y="384" width="272" height="408" rx="40" fill="url(#rail)" stroke="#c8f750" stroke-opacity="0.35" />
  <text x="448" y="452" fill="#f4f4f6" font-family="Bricolage Grotesque, sans-serif" font-size="44" font-weight="800">RyFine</text>
  <g font-family="Geist Mono, monospace" font-size="22">
    <rect x="448" y="500" width="184" height="44" rx="22" fill="#111823" stroke="#5cc8ff" stroke-opacity="0.3" />
    <text x="476" y="529" fill="#5cc8ff">intent</text>
    <rect x="448" y="562" width="184" height="44" rx="22" fill="#111823" stroke="#c8f750" stroke-opacity="0.35" />
    <text x="476" y="591" fill="#c8f750">rules</text>
    <rect x="448" y="624" width="184" height="44" rx="22" fill="#111823" stroke="#c8f750" stroke-opacity="0.35" />
    <text x="476" y="653" fill="#c8f750">skills</text>
    <rect x="448" y="686" width="184" height="44" rx="22" fill="#111823" stroke="#5cc8ff" stroke-opacity="0.3" />
    <text x="476" y="715" fill="#5cc8ff">context</text>
  </g>

  <path d="M346 586H404" stroke="#c8f750" stroke-width="8" stroke-linecap="round" />
  <path d="M676 586H734" stroke="#c8f750" stroke-width="8" stroke-linecap="round" />

  <rect x="734" y="404" width="264" height="362" rx="28" fill="#14141a" stroke="#ffffff" stroke-opacity="0.08" />
  <text x="766" y="452" fill="#c8f750" font-family="Geist Mono, monospace" font-size="22" letter-spacing="2">REFINED PROMPT</text>
  <text x="766" y="516" fill="#f4f4f6" font-family="Hanken Grotesk, sans-serif" font-size="30" font-weight="700">Write onboarding docs that:</text>
  <text x="766" y="572" fill="#b8b8c5" font-family="Hanken Grotesk, sans-serif" font-size="26">• explain the repo structure</text>
  <text x="766" y="610" fill="#b8b8c5" font-family="Hanken Grotesk, sans-serif" font-size="26">• target new engineers</text>
  <text x="766" y="648" fill="#b8b8c5" font-family="Hanken Grotesk, sans-serif" font-size="26">• include setup and scripts</text>
  <text x="766" y="686" fill="#b8b8c5" font-family="Hanken Grotesk, sans-serif" font-size="26">• use concise technical tone</text>

  <rect x="82" y="852" width="916" height="146" rx="28" fill="#14141a" stroke="#ffffff" stroke-opacity="0.08" />
  <text x="122" y="908" fill="#f4f4f6" font-family="Bricolage Grotesque, sans-serif" font-size="42" font-weight="800">Refine first. Execute second.</text>
  <text x="122" y="954" fill="#b8b8c5" font-family="Hanken Grotesk, sans-serif" font-size="28">Learn more at ryfine.app</text>
  <text x="760" y="954" fill="#c8f750" font-family="Geist Mono, monospace" font-size="22" letter-spacing="2">TRY RYFINE NOW</text>
</svg>