<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">How RyFine Refines a Prompt banner</title>
  <desc id="desc">A wide infographic showing a rough prompt traveling through RyFine context layers and emerging as a refined prompt.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0c" />
      <stop offset="100%" stop-color="#111823" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" rx="32" />
  <g opacity="0.16">
    <path d="M0 157H1200" stroke="#ffffff" />
    <path d="M0 314H1200" stroke="#ffffff" />
    <path d="M0 471H1200" stroke="#ffffff" />
    <path d="M240 0V630" stroke="#ffffff" />
    <path d="M480 0V630" stroke="#ffffff" />
    <path d="M720 0V630" stroke="#ffffff" />
    <path d="M960 0V630" stroke="#ffffff" />
  </g>
  <text x="64" y="78" fill="#c8f750" font-family="Geist Mono, monospace" font-size="20" letter-spacing="3">RYFINE GUIDE ASSET</text>
  <text x="64" y="154" fill="#f4f4f6" font-family="Bricolage Grotesque, sans-serif" font-size="64" font-weight="800">How RyFine Refines a Prompt</text>
  <text x="64" y="198" fill="#b8b8c5" font-family="Hanken Grotesk, sans-serif" font-size="24">Rough input in, structured instruction out.</text>

  <rect x="64" y="262" width="270" height="250" rx="24" fill="#14141a" stroke="#ffffff" stroke-opacity="0.08" />
  <text x="92" y="308" fill="#5cc8ff" font-family="Geist Mono, monospace" font-size="18">RAW</text>
  <text x="92" y="364" fill="#f4f4f6" font-family="Hanken Grotesk, sans-serif" font-size="28" font-weight="700">write docs for our repo</text>
  <text x="92" y="418" fill="#8b8b99" font-family="Hanken Grotesk, sans-serif" font-size="22">No audience.</text>
  <text x="92" y="450" fill="#8b8b99" font-family="Hanken Grotesk, sans-serif" font-size="22">No scope.</text>
  <text x="92" y="482" fill="#8b8b99" font-family="Hanken Grotesk, sans-serif" font-size="22">No output format.</text>

  <rect x="392" y="232" width="220" height="310" rx="32" fill="#17211f" stroke="#c8f750" stroke-opacity="0.35" />
  <text x="436" y="288" fill="#f4f4f6" font-family="Bricolage Grotesque, sans-serif" font-size="38" font-weight="800">RyFine</text>
  <g font-family="Geist Mono, monospace" font-size="18">
    <rect x="432" y="328" width="136" height="38" rx="19" fill="#111823" /><text x="462" y="352" fill="#5cc8ff">intent</text>
    <rect x="432" y="382" width="136" height="38" rx="19" fill="#111823" /><text x="468" y="406" fill="#c8f750">rules</text>
    <rect x="432" y="436" width="136" height="38" rx="19" fill="#111823" /><text x="468" y="460" fill="#c8f750">skills</text>
    <rect x="432" y="490" width="136" height="38" rx="19" fill="#111823" /><text x="460" y="514" fill="#5cc8ff">context</text>
  </g>
  <path d="M334 388H392" stroke="#c8f750" stroke-width="7" stroke-linecap="round" />
  <path d="M612 388H670" stroke="#c8f750" stroke-width="7" stroke-linecap="round" />

  <rect x="670" y="262" width="466" height="250" rx="24" fill="#14141a" stroke="#ffffff" stroke-opacity="0.08" />
  <text x="704" y="308" fill="#c8f750" font-family="Geist Mono, monospace" font-size="18">REFINED</text>
  <text x="704" y="364" fill="#f4f4f6" font-family="Hanken Grotesk, sans-serif" font-size="26" font-weight="700">Write onboarding docs for new engineers that:</text>
  <text x="704" y="414" fill="#b8b8c5" font-family="Hanken Grotesk, sans-serif" font-size="22">• explain the repo map and setup scripts</text>
  <text x="704" y="446" fill="#b8b8c5" font-family="Hanken Grotesk, sans-serif" font-size="22">• call out local-first workflow expectations</text>
  <text x="704" y="478" fill="#b8b8c5" font-family="Hanken Grotesk, sans-serif" font-size="22">• stay concise and practical</text>

  <text x="64" y="582" fill="#c8f750" font-family="Geist Mono, monospace" font-size="20" letter-spacing="2">Learn more at ryfine.app</text>
</svg>