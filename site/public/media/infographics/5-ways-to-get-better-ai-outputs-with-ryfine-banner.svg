    <rect x="60" y="308" width="520" height="70" rx="20" fill="#14141a" /><text x="92" y="352" fill="#c8f750" font-weight="700">01</text><text x="150" y="352" fill="#f4f4f6">Refine before the expensive run.</text>
    <rect x="60" y="398" width="520" height="70" rx="20" fill="#14141a" /><text x="92" y="442" fill="#c8f750" font-weight="700">02</text><text x="150" y="442" fill="#f4f4f6">Use Rules and Skills for reusable constraints.</text>
