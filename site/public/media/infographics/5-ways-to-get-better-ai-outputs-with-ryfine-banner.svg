  <text x="178" y="196" fill="#f4f4f6" font-family="Bricolage Grotesque, sans-serif" font-size="58" font-weight="800">AI Outputs with RyFine</text>
  <text x="178" y="242" fill="#b8b8c5" font-family="Hanken Grotesk, sans-serif" font-size="24">Refine first, then execute with the model you trust.</text>

