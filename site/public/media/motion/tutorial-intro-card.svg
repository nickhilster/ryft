    <text x="56" y="72" fill="#5cc8ff" font-family="Geist Mono, monospace" font-size="30" letter-spacing="4">USE FOR</text>
    <text x="56" y="132" fill="#f4f4f6" font-family="Hanken Grotesk, sans-serif" font-size="50" font-weight="700">Rough prompts, reusable systems, and context-aware refinements</text>
