<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc">
  <title id="title">RyFine tutorial outro card</title>
  <desc id="desc">A branded outro CTA card for RyFine tutorials.</desc>
  <rect width="1920" height="1080" fill="#0a0a0c" />
  <circle cx="960" cy="540" r="420" fill="#c8f750" fill-opacity="0.08" />
  <g transform="translate(960 338)">
    <circle cx="0" cy="0" r="72" fill="none" stroke="#c8f750" stroke-width="16" />
